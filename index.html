<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シェア180｜不具合サポート</title>
<style>
:root{--accent:#2563EB;--accent-l:#EEF3FF;--accent-d:#1D4ED8;--danger:#DC2626;--danger-l:#FEF2F2;--success:#16A34A;--success-l:#F0FDF4;--warning:#D97706;--warning-l:#FFFBEB;--border:#E2E4E9;--text:#1A1D23;--text2:#5A6070;--text3:#9BA3B2;--bg:#F4F5F7;--sur:#fff;--sur2:#F8F9FB;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--sur);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.htitle{font-weight:700;font-size:13px}.hsub{font-size:10px;color:var(--text2);margin-top:1px}
.live{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--success)}
.live::before{content:"";width:6px;height:6px;background:var(--success);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat{flex:1;max-width:680px;width:100%;margin:0 auto;display:flex;flex-direction:column}
#msgs{overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:11px;height:calc(100vh - 58px)}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.row{display:flex;gap:7px;align-items:flex-start}
.row.user{flex-direction:row-reverse}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:2px}
.av.bot{background:var(--accent);color:#fff}.av.usr{background:#E2E8F0;color:var(--text2)}
.bub{max-width:calc(100% - 38px);padding:10px 13px;border-radius:11px;font-size:13px;line-height:1.6;word-break:break-word}
.bub.bot{background:var(--sur);border:1px solid var(--border);border-top-left-radius:3px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.bub.usr{background:var(--accent);color:#fff;border-top-right-radius:3px}
.choices{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.ch{padding:7px 13px;border:1.5px solid var(--accent);border-radius:18px;background:#fff;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left}
.ch:hover{background:var(--accent-l)}.ch.danger{border-color:var(--danger);color:var(--danger)}.ch.danger:hover{background:var(--danger-l)}.ch:disabled{opacity:.4;cursor:not-allowed}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:9px}
.cat{padding:10px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--sur);cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.cat:hover{border-color:var(--accent);background:var(--accent-l)}.cat.urg{border-color:var(--danger)}.cat.urg:hover{background:var(--danger-l)}
.cat-icon{font-size:18px;margin-bottom:3px;display:block}.cat-name{font-size:12px;font-weight:700}.cat-desc{font-size:10px;color:var(--text2);margin-top:1px}
.steps{list-style:none;margin-top:7px}
.steps li{display:flex;gap:7px;align-items:flex-start;padding:5px 0;font-size:12px;line-height:1.5;border-bottom:1px solid var(--border)}
.steps li:last-child{border-bottom:none}
.sn{min-width:18px;height:18px;background:var(--accent);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.alert{padding:9px 12px;border-radius:7px;font-size:12px;line-height:1.6;border-left:3px solid;margin-top:7px}
.alert.d{background:var(--danger-l);border-color:var(--danger);color:#991B1B}
.alert.s{background:var(--success-l);border-color:var(--success);color:#166534}
.alert.i{background:var(--accent-l);border-color:var(--accent);color:#1E40AF}
.alert.w{background:var(--warning-l);border-color:var(--warning);color:#92400E}
.res{display:flex;gap:7px;margin-top:11px}
.rb{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.rb.yes{background:var(--success);color:#fff}.rb.no{background:var(--danger);color:#fff}.rb:hover{opacity:.88}
.done{text-align:center;padding:12px 6px}
.done .ic{font-size:40px;display:block;margin-bottom:9px}
.done h3{font-size:14px;font-weight:700;margin-bottom:5px}.done p{font-size:12px;color:var(--text2);line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-top:7px}
.badge.b{background:var(--accent-l);color:var(--accent)}.badge.g{background:var(--success-l);color:var(--success)}
.esc-form{margin-top:9px;display:flex;flex-direction:column;gap:8px}
.esc-form label{font-size:11px;font-weight:600;color:var(--text2)}
.esc-form textarea,.model-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;background:var(--sur2);resize:vertical;outline:none}
.esc-form textarea{min-height:65px}.model-input{min-height:38px;resize:none}
.esc-form textarea:focus,.model-input:focus{border-color:var(--accent);background:#fff}
.esc-btn{padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.esc-btn:disabled{opacity:.5;cursor:not-allowed}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.mo-box{background:var(--sur);border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.mo-box h2{font-size:15px;font-weight:700;margin-bottom:4px}
.mo-box .sub{font-size:11px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.fl{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:3px}
.mi{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;margin-bottom:10px;outline:none;background:var(--sur2)}
.mi:focus{border-color:var(--accent);background:#fff}
.area-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.ab{padding:8px 6px;border:1.5px solid var(--border);border-radius:7px;background:var(--sur2);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.ab.sel{border-color:var(--accent);background:var(--accent-l);color:var(--accent);font-weight:700}
.start{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:3px}
.start:hover{background:var(--accent-d)}
</style>
</head>
<body>
<div class="mo" id="modal">
  <div class="mo-box">
    <h2>&#127968; シェア180&#65372;不具合サポート</h2>
    <p class="sub">選択式でお困りの内容をお聞きします。解決しない場合はスタッフが引き継ぎます。</p>
    <label class="fl">エリア <span style="color:var(--danger)">*</span></label>
    <div class="area-g" id="area-g"></div>
    <div id="prop-w" style="display:none">
      <label class="fl">物件名 <span style="color:var(--danger)">*</span></label>
      <select class="mi" id="sel-prop"><option value="">-- 物件を選んでください --</option></select>
    </div>
    <label class="fl">部屋番号 <span style="color:var(--danger)">*</span></label>
    <input type="text" class="mi" id="inp-room" placeholder="例：101、203B" maxlength="20">
    <label class="fl">お名前 <span style="color:var(--danger)">*</span></label>
    <input type="text" class="mi" id="inp-name" placeholder="例：山田 太郎" maxlength="30">
    <button class="start" id="start-btn">サポートを開始する &#8594;</button>
    <p style="font-size:10px;color:var(--text3);margin-top:9px;text-align:center">入力情報はスタッフへの連絡時のみ使用します</p>
  </div>
</div>
<header>
  <div class="logo">180</div>
  <div><div class="htitle">シェア180&#65372;不具合サポート</div><div class="hsub" id="hsub">物件・部屋番号を入力してください</div></div>
  <div class="live">対応中</div>
</header>
<div class="chat"><div id="msgs"></div></div>
<script>

const FLOW = {"root": {"type": "cat", "msg": "カテゴリを選んでください。", "cats": [{"icon": "🚿", "name": "水回り", "desc": "蛇口・お湯・排水・水漏れ", "next": "water"}, {"icon": "🏠", "name": "建物・部屋", "desc": "ドア・窓・壁・床・カビ", "next": "building"}, {"icon": "🔑", "name": "鍵・入退室", "desc": "開かない・紛失・電子錠", "next": "key"}, {"icon": "📶", "name": "Wi-Fi・ネット", "desc": "繋がらない・遅い", "next": "wifi"}, {"icon": "💡", "name": "電気・照明", "desc": "停電・電球切れ・コンセント", "next": "electric"}, {"icon": "📦", "name": "家具・家電", "desc": "エアコン・洗濯機・冷蔵庫・ベッドなど", "next": "appliance"}, {"icon": "👥", "name": "ハウスルール・生活", "desc": "騒音・ゴミ・私物放置", "next": "rule"}, {"icon": "🚨", "name": "緊急（今すぐ）", "desc": "大量水漏れ・ガス漏れ等", "next": "urgent", "danger": true}, {"icon": "💬", "name": "その他・害虫", "desc": "害虫・臭い・上記にない", "next": "other"}]}, "water": {"type": "choice", "msg": "水回りの不具合ですね。詳しく教えてください。", "choices": [{"label": "お湯が出ない", "next": "water_hot"}, {"label": "水が出ない（全箇所）", "next": "water_none"}, {"label": "排水が詰まっている", "next": "water_drain"}, {"label": "水漏れしている", "next": "water_leak"}, {"label": "シャワーの水圧が弱い", "next": "water_shower"}, {"label": "給湯器から異音がする", "next": "water_boiler_sound"}, {"label": "上記にない水回りの不具合", "next": "esc_water"}]}, "water_hot": {"type": "choice", "msg": "お湯が出ない状況を教えてください。", "choices": [{"label": "全ての蛇口でお湯が出ない", "next": "water_hot_all"}, {"label": "1箇所だけお湯が出ない", "next": "water_hot_one"}]}, "water_hot_all": {"type": "choice", "msg": "給湯器にエラーコードは表示されていますか？", "choices": [{"label": "エラーコードが表示されている", "next": "water_hot_error"}, {"label": "エラーなし・ガスコンロも使えない", "next": "water_hot_gas"}, {"label": "エラーなし・ガスコンロは使える", "next": "water_hot_reboot"}]}, "water_hot_error": {"type": "model", "msg": "給湯器の品番とエラーコードを確認します。", "item": "給湯器", "next": "water_hot_error2"}, "water_hot_error2": {"type": "escalate", "msg": "品番・エラーコードを確認しました。スタッフが至急対応します。", "collect": "給湯器品番・エラーコード（写真）"}, "water_hot_gas": {"type": "choice", "msg": "ガスメーター横の赤いランプが点滅していますか？", "choices": [{"label": "点滅している", "next": "water_hot_gas_blink"}, {"label": "点滅していない", "next": "esc_water"}]}, window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('start-btn').addEventListener('click', startChat);
  const ag=document.getElementById("area-g");
  Object.keys(AREAS).forEach(function(a) {
    const b=document.createElement("button");
    b.className="ab";
    b.textContent=a;
    b.addEventListener('click', function() {
      U.area=a; U.property="";
      document.querySelectorAll(".ab").forEach(function(x){x.classList.remove("sel")});
      b.classList.add("sel");
      const sel=document.getElementById("sel-prop");
      sel.innerHTML='<option value="">-- 物件を選んでください --</option>';

  document.getElementById("sel-prop").addEventListener('change', function(e){U.property=e.target.value});

function startChat() {
  U.room=document.getElementById("inp-room").value.trim();
  U.name=document.getElementById("inp-name").value.trim();
  if(!U.area||!U.property||!U.room||!U.name){alert("すべての項目を入力してください");return}
  document.getElementById("modal").style.display="none";
  document.getElementById("hsub").textContent=U.property+" "+U.room+"号室 "+U.name+"さん";
  showWelcome();
}

function scrollB(){const m=document.getElementById("msgs");m.scrollTop=m.scrollHeight}

function addBot(html){
  const d=document.createElement("div");d.className="row";
  d.innerHTML='<div class="av bot">&#129302;</div><div class="bub bot">'+html+'</div>';
  document.getElementById("msgs").appendChild(d);scrollB();
}
function addUser(text){
  const d=document.createElement("div");d.className="row user";
  d.innerHTML='<div class="bub usr">'+escHtml(text)+'</div><div class="av usr">&#128100;</div>';
  document.getElementById("msgs").appendChild(d);scrollB();
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function disableAll(){document.querySelectorAll(".ch,.cat,.rb,.esc-btn").forEach(function(b){b.disabled=true})}

function showWelcome(){
  const node=FLOW["root"];
  let catsHtml='<div class="cat-grid">';
  node.cats.forEach(function(c){
    catsHtml+='<button class="cat'+(c.danger?' urg':'')+'" onclick="selectCat(\''+c.next+'\',\''+c.name+'\')"><span class="cat-icon">'+c.icon+'</span><div class="cat-name">'+c.name+'</div><div class="cat-desc">'+c.desc+'</div></button>';
  });
  catsHtml+='</div>';
  addBot('<strong>'+escHtml(U.name)+'さん（'+escHtml(U.property)+' '+escHtml(U.room)+'号室）、こんにちは！</strong><br><span style="font-size:11px;color:var(--text2)">不具合のカテゴリを選んでください。</span>'+catsHtml);
}

function selectCat(nodeKey,label){
  disableAll();
  addUser(label);
  renderNode(nodeKey);
}

function renderNode(nodeKey){
  const node=FLOW[nodeKey];
  if(!node){addBot("情報が見つかりませんでした。");return}
  currentNode=nodeKey;
  if(node.type==="choice"){
    let html=escHtml(node.msg)+'<div class="choices">';
    node.choices.forEach(function(c,i){
      html+='<button class="ch'+(c.danger?' danger':'')+'" onclick="choiceClick('+i+',\''+nodeKey+'\')">'+escHtml(c.label)+'</button>';
    });
    html+='</div>';
    addBot(html);
  } else if(node.type==="model"){
    currentItem=node.item;
    const loc=MODEL_LOCATION[node.item]||"本体の側面・背面・底面のシールに記載されています。";
    addBot('<strong>&#128203; '+escHtml(node.item)+'の品番を確認します</strong><br><span style="font-size:12px">'+escHtml(loc)+'</span><div class="alert i" style="margin-top:8px;font-size:12px">英数字の型番を確認してください。わからない場合は空欄のままでも次に進めます。</div><div class="esc-form"><label>品番・型番（任意・わからなければ空欄でOK）</label><textarea class="model-input" id="model-inp" placeholder="例：MSZ-GE2523-W（わからない場合は空欄でOK）" rows="2"></textarea><button class="esc-btn" onclick="submitModel(\''+node.next+'\')">確認して次へ →</button></div>');
  } else if(node.type==="steps"){
    showSteps(node);
  } else if(node.type==="escalate"){
    showEscalate(node);
  } else if(node.type==="urgent"){
    showUrgent(node);
  }
}

function choiceClick(idx,nodeKey){
  disableAll();
  const node=FLOW[nodeKey];
  const choice=node.choices[idx];
  addUser(choice.label);
  renderNode(choice.next);
}

function submitModel(nextKey){
  disableAll();
  const inp=document.getElementById("model-inp");
  modelNum=inp?inp.value.trim():"";
  const msg=modelNum?"品番「"+modelNum+"」を確認しました。":"品番は未入力で進みます。";
  addUser(msg);
  renderNode(nextKey);
}

function showSteps(node){
  let stepsHtml='<ul class="steps">';
  node.steps.forEach(function(s,i){stepsHtml+='<li><div class="sn">'+(i+1)+'</div><div>'+escHtml(s)+'</div></li>'});
  stepsHtml+='</ul>';
  const collectStr=JSON.stringify(node.collect||"");
  addBot(escHtml(node.msg)+stepsHtml+'<div class="res"><button class="rb yes" onclick="resolveYes()">&#10003; 解決した！</button><button class="rb no" onclick="resolveNo('+collectStr+')">&#10007; まだ解決しない</button></div>');
}

  }
  const collectStr=JSON.stringify(node.collect||"");
  addBot('<div class="alert d">&#9888;&#65039; 緊急対応が必要です</div>'+stepsHtml+'<div class="alert w" style="margin-top:8px">スタッフに引き継ぎます。補足があれば入力してください。</div><div class="esc-form"><label>現在の状況（任意）</label><textarea id="esc-txt" placeholder="例：3階シャワー室の天井から大量に水が漏れています"></textarea><button class="esc-btn" onclick="submitEsc(true,'+collectStr+')">&#128680; 今すぐスタッフに引き継ぐ</button></div>');
}

function resolveYes(){
  disableAll();resolved=true;
  addUser("解決しました！");
  saveLog("resolved");
  addBot('<div class="done"><span class="ic">&#127881;</span><h3>解決できてよかったです！</h3><p>お役に立てて嬉しいです。今後もお気軽にご利用ください。</p><span class="badge g">&#10003; 対応完了</span></div>');
}

function resolveNo(collect){
  disableAll();
  addUser("まだ解決しない");
  const collectStr=JSON.stringify(collect||"");
  addBot('<div class="alert i">&#128203; スタッフに引き継ぎます。<br><span style="font-size:11px">補足があれば入力してください（任意）。</span></div><div class="esc-form"><label>状況の補足（任意）</label><textarea id="esc-txt" placeholder="試した内容や現在の状況を教えてください。"></textarea><button class="esc-btn" onclick="submitEsc(false,'+collectStr+')">&#128203; スタッフに引き継ぐ</button></div>');
}

function submitEsc(isUrgent,collect){
  const txt=document.getElementById("esc-txt");
  const detail=txt?txt.value.trim():"";
  disableAll();escalated=true;
  if(detail)addUser(detail);
  saveLog(isUrgent?"urgent":"escalated",detail);
  addBot('<div class="done"><span class="ic">'+(isUrgent?"&#128680;":"&#128203;")+'</span><h3>スタッフに引き継ぎました</h3><p>内容を確認の上、折り返しご連絡いたします。</p><span class="badge b">受付ID: '+sessionId+'</span></div>');
}

async function saveLog(status,detail){
  if(!window.storage)return;
  try{
    const log={sessionId:sessionId,property:U.property,room:U.room,name:U.name,category:currentNode,modelNum:modelNum,status:status,detail:detail||"",time:new Date().toISOString()};
    await window.storage.set("log_"+sessionId,JSON.stringify(log));
    let idx=[];
    try{const r=await window.storage.get("log_index");if(r)idx=JSON.parse(r.value)}catch(e){}
    idx=idx.filter(function(i){return i.sessionId!==sessionId});
    idx.unshift(Object.assign({key:"log_"+sessionId},log));
    if(idx.length>300)idx=idx.slice(0,300);
    await window.storage.set("log_index",JSON.stringify(idx));
  }catch(e){}
}

</script>
