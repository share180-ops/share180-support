const CATEGORIES = [
  {icon:"🚿",name:"水回り",desc:"蛇口・排水・詰まり・水漏れ",key:"water"},
  {icon:"🌡️",name:"エアコン",desc:"冷暖房・動かない・異音",key:"aircon"},
  {icon:"🚽",name:"トイレ",desc:"詰まり・流れない・水が止まらない",key:"toilet"},
  {icon:"🔑",name:"鍵・入退室",desc:"開かない・閉まらない・紛失",key:"key"},
  {icon:"📶",name:"Wi-Fi・ネット",desc:"繋がらない・遅い",key:"wifi"},
  {icon:"💡",name:"電気・照明",desc:"停電・電球切れ・コンセント",key:"electric"},
  {icon:"🪟",name:"ドア・窓・建具",desc:"擦れる・閉まらない",key:"door"},
  {icon:"🐛",name:"害虫・害獣",desc:"ゴキブリ・蜂・ネズミ",key:"pest"},
  {icon:"🏠",name:"建物・共用設備",desc:"雨漏り・共用洗濯機",key:"building"},
  {icon:"👥",name:"ハウスルール",desc:"騒音・私物放置・ゴミ",key:"rule"},
  {icon:"🚨",name:"緊急（今すぐ）",desc:"大量水漏れ・ガス漏れ等",key:"urgent"},
  {icon:"💬",name:"その他",desc:"上記にない不具合",key:"other"},
];

const BASE_SYSTEM = `あなたはシェアハウス「シェア180」の不具合対応AIアシスタントです。
入居者の不具合を段階的に深掘りしながら、原因を特定した上で解決策を案内してください。

【絶対に守る対話フロー：必ず4段階で進める】

■ STEP1：症状の確認（1回目の返答）
- 「どこで」「いつから」「どんな状態か」を確認する質問を2〜3個する
- まだ解決策は言わない。情報収集に徹する

■ STEP2：原因の絞り込み（2回目の返答）
- STEP1の回答を受けて、さらに原因を絞るための質問をする
- 「〜の場合とそうでない場合で原因が違うので教えてください」のように理由を添えて聞く
- まだ解決策は言わない

■ STEP3：品番・型番の確認（エアコン・洗濯機・給湯器・冷蔵庫・電子レンジ・照明・その他家電が対象）
- 「本体の側面・背面・底面のシールに型番が書いてあります。〇〇から始まる英数字の文字列です。写真を撮って教えていただけますか？」と必ず聞く
- 品番が分からない場合は「わからない」でも先に進む
- 家具（ベッド・棚・椅子等）の場合は「メーカー名・購入時期（わかれば）」を確認する

■ STEP4：解決策の案内（3〜4回目以降）
- STEP1〜3で集めた情報をもとに、原因として考えられるものを「おそらく〇〇が原因と思われます」と明示する
- 入居者が自力で試せる手順を番号付きで具体的に案内する
- 手順を案内したら「試してみてください。解決しましたか？」と確認する

【その他のルール】
- 回答は1回につき150文字以内で簡潔に。質問は1回に2〜3個まで
- やさしい口調・専門用語は使わない・プレーンテキスト（HTMLタグなし）
- 5往復以上で解決しない場合は「スタッフに引き継ぎます」とだけ伝える。それ以上の説明は不要
- ガス漏れ・大量水漏れ・感電の危険がある場合は即「緊急対応として引き継ぎます」と伝える
- 品番が判明した場合はその機器特有の対処法を具体的に案内する
- 「スタッフに連絡してください」「管理会社に連絡を」「180に連絡を」などの表現は絶対に使わない。常にこちらから引き継ぐ形にする

【家電・設備ごとの品番確認場所の案内例】
- エアコン：室内機の前面パネルを開けたフィルターの横、または側面のシール
- 洗濯機：本体の蓋を開けた内側、または背面のシール
- 給湯器：本体正面または側面のシール（型番はリモコンにも記載の場合あり）
- 冷蔵庫：庫内の側面または背面のシール
- 電子レンジ：扉を開けた内側または背面
- 照明：器具本体の内側またはカバーの内側のシール`;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtTime(t) {
  if (!t) return "—";
  const diff = Math.round((Date.now() - new Date(t)) / 60000);
  if (diff < 1) return "たった今";
  if (diff < 60) return diff + "分前";
  if (diff < 1440) return Math.round(diff/60) + "時間前";
  return Math.round(diff/1440) + "日前";
}
function fmtFull(t) {
  if (!t) return "—";
  return new Date(t).toLocaleString("ja-JP", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
function badgeStyle(status) {
  const m = {
    resolved: {bg:"#F0FDF4",color:"#16A34A",label:"✓ 解決"},
    escalated: {bg:"#FFFBEB",color:"#D97706",label:"📋 要対応"},
    urgent:    {bg:"#FEF2F2",color:"#DC2626",label:"🚨 緊急"},
    ongoing:   {bg:"#EEF3FF",color:"#2563EB",label:"💬 対話中"},
  };
  return m[status] || m.ongoing;
}

// ==================== チャットボット ====================
function Chatbot({ onSwitchAdmin }) {
  const [phase, setPhase] = useState("modal"); // modal | chat
  const [user, setUser] = useState({ area:"", property:"", room:"", name:"" });
  const [messages, setMessages] = useState([]);
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [session] = useState(() => ({ id: genId(), startTime: new Date().toISOString() }));
  const [resolved, setResolved] = useState(null);
  const [escalated, setEscalated] = useState(false);
  const [escDetail, setEscDetail] = useState("");
  const [showEscForm, setShowEscForm] = useState(false);
  const [category, setCategory] = useState("");
  const messagesEnd = useRef(null);
  const sysPromptRef = useRef("");

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  const saveLog = async (status, detail="", hist=history) => {
    if (!window.storage) return;
    try {
      const log = {
        sessionId: session.id, property: user.property, room: user.room, name: user.name,
        category, status, detail, startTime: session.startTime,
        endTime: new Date().toISOString(),
        turns: hist.filter(m=>m.role==="user").length, history: hist
      };
      await window.storage.set("log_" + session.id, JSON.stringify(log));
      let idx = [];
      try { const r = await window.storage.get("log_index"); if (r) idx = JSON.parse(r.value); } catch(e){}
      idx = idx.filter(i => i.sessionId !== session.id);
      idx.unshift({ key:"log_"+session.id, sessionId:session.id, property:user.property, room:user.room, name:user.name, category, status, time:new Date().toISOString() });
      if (idx.length > 300) idx = idx.slice(0,300);
      await window.storage.set("log_index", JSON.stringify(idx));
    } catch(e) {}
  };

  const addMsg = (role, content, extra={}) => {
    setMessages(prev => [...prev, { role, content, ...extra }]);
  };

  const startChat = () => {
    if (!user.area || !user.property || !user.room || !user.name) { alert("すべての項目を入力してください"); return; }
    setPhase("chat");
    addMsg("bot", `**${user.name}さん（${user.property} ${user.room}号室）、こんにちは！**\n不具合のカテゴリを選んでください。`, { type:"welcome" });
  };

  const selectCategory = (cat) => {
    setCategory(cat.name);
    addMsg("user", cat.name);
    if (cat.key === "urgent") {
      addMsg("bot", "urgent", { type:"urgent" });
      return;
    }
    sysPromptRef.current = `${BASE_SYSTEM}\n\n【担当カテゴリ】${cat.name}\n【入居者】${user.name}さん / ${user.property} ${user.room}号室\n\n※まずSTEP1として症状確認の質問から始めてください。解決策はまだ言わないでください。\n※「スタッフに連絡してください」は絶対に言わない。引き継ぎが必要なら「スタッフに引き継ぎます」とだけ言う。`;
    const first = `${cat.name}の不具合ですね。原因をしっかり特定してから対処法をご案内します。\n\nまず状況を教えてください。\n①どこで発生していますか？（共用部・個室・特定の場所など）\n②いつ頃から起きていますか？\n③具体的にどんな状態ですか？`;
    const newHist = [{ role:"assistant", content:first }];
    setHistory(newHist);
    addMsg("bot", first, { type:"ai", showResolve:false });
    saveLog("ongoing", "", newHist);
  };

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const text = input.trim();
    setInput("");
    addMsg("user", text);
    const newHist = [...history, { role:"user", content:text }];
    setHistory(newHist);
    setLoading(true);
    try {
      const res = await fetch(ANTHROPIC_API, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system:sysPromptRef.current, messages:newHist })
      });
      const data = await res.json();
      if (data.content?.[0]) {
        const reply = data.content[0].text;
        const updatedHist = [...newHist, { role:"assistant", content:reply }];
        setHistory(updatedHist);
        const needCheck = reply.includes("解決しましたか") || reply.includes("試してみて") || reply.includes("いかがですか") || reply.includes("直りましたか");
        addMsg("bot", reply, { type:"ai", showResolve:needCheck });
        const userTurns = updatedHist.filter(m=>m.role==="user").length;
        if (userTurns >= 6 && resolved === null && !escalated) {
          addMsg("bot", "スタッフに引き継ぎます。", { type:"handoff-notice" });
          setShowEscForm(true);
        }
        saveLog("ongoing", "", updatedHist);
      }
    } catch(e) {
      addMsg("bot", "⚠️ 通信エラーが発生しました。再度お試しください。", { type:"error" });
    }
    setLoading(false);
  };

  const handleResolved = (yes) => {
    setResolved(yes);
    if (yes) {
      addMsg("user", "✓ 解決しました！");
      addMsg("bot", "resolved", { type:"done-resolved" });
      saveLog("resolved");
    } else {
      addMsg("user", "✗ まだ解決しない");
      addMsg("bot", "スタッフに引き継ぎます。", { type:"handoff-notice" });
      setShowEscForm(true);
    }
  };

  const submitEscalate = () => {
    setEscalated(true);
    setShowEscForm(false);
    saveLog("escalated", escDetail);
    addMsg("user", escDetail || "（補足なし）");
    addMsg("bot", session.id, { type:"done-escalated" });
  };

  const urgentReport = (reason) => {
    setCategory(reason);
    addMsg("user", reason);
    saveLog("urgent", "緊急連絡");
    addMsg("bot", session.id, { type:"done-urgent" });
  };

  // レンダリング
  const renderMsg = (msg, i) => {
    const isBot = msg.role === "bot";
    return (
      <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", flexDirection: isBot ? "row" : "row-reverse", marginBottom:12 }}>
        <div style={{ width:28, height:28, borderRadius:"50%", background: isBot ? "#2563EB" : "#E2E8F0", color: isBot ? "#fff" : "#5A6070", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, flexShrink:0, marginTop:2 }}>
          {isBot ? "🤖" : "👤"}
        </div>
        <div style={{ maxWidth:"calc(100% - 44px)", padding:"10px 14px", borderRadius:12, fontSize:13, lineHeight:1.65, wordBreak:"break-word",
          background: isBot ? "#fff" : "#2563EB", color: isBot ? "#1A1D23" : "#fff",
          border: isBot ? "1px solid #E2E4E9" : "none",
          borderTopLeftRadius: isBot ? 4 : 12, borderTopRightRadius: isBot ? 12 : 4,
          boxShadow: isBot ? "0 1px 3px rgba(0,0,0,.06)" : "none"
        }}>
          {renderBubble(msg)}
        </div>
      </div>
    );
  };

  const renderBubble = (msg) => {
    if (msg.role === "user") return <span>{msg.content}</span>;

    if (msg.type === "welcome") return (
      <div>
        <div style={{ fontWeight:700, marginBottom:6 }}>{msg.content.replace("**","").replace("**","")}</div>
        <div style={{ fontSize:11, color:"#5A6070", marginBottom:10 }}>不具合のカテゴリを選んでください。AIが解決策をご案内します。</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
          {CATEGORIES.map(cat => (
            <button key={cat.key} onClick={() => selectCategory(cat)} style={{
              padding:"10px 8px", border: cat.key === "urgent" ? "1.5px solid #DC2626" : "1.5px solid #E2E4E9",
              borderRadius:9, background:"#fff", cursor:"pointer", textAlign:"left", fontFamily:"inherit",
              transition:"all .15s"
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = cat.key==="urgent"?"#DC2626":"#2563EB"; e.currentTarget.style.background = cat.key==="urgent"?"#FEF2F2":"#EEF3FF"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = cat.key==="urgent"?"#DC2626":"#E2E4E9"; e.currentTarget.style.background = "#fff"; }}>
              <span style={{ fontSize:18, display:"block", marginBottom:3 }}>{cat.icon}</span>
              <div style={{ fontSize:12, fontWeight:700, color:"#1A1D23" }}>{cat.name}</div>
              <div style={{ fontSize:10, color:"#5A6070", marginTop:1 }}>{cat.desc}</div>
            </button>
          ))}
        </div>
      </div>
    );

    if (msg.type === "urgent") return (
      <div>
        <div style={{ background:"#FEF2F2", border:"1px solid #DC2626", borderLeft:"3px solid #DC2626", borderRadius:8, padding:"10px 12px", fontSize:12, color:"#991B1B", marginBottom:10 }}>
          <strong>🚨 緊急の場合は今すぐ実行してください：</strong><br/>
          ・ガス漏れ → 窓を開けて避難 → ガス会社へ電話<br/>
          ・大量水漏れ → 元栓を閉める<br/>
          ・火災 → 避難 → 119番
        </div>
        <div style={{ fontSize:12, marginBottom:8 }}>緊急の種類を選んでください：</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {["💧 大量水漏れ","⚠️ ガス漏れ","⚡ 停電","🐝 蜂の巣","🆘 その他緊急"].map(r => (
            <button key={r} onClick={() => urgentReport(r)} style={{ padding:"7px 12px", border:"1.5px solid #DC2626", borderRadius:20, background:"#fff", color:"#DC2626", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{r}</button>
          ))}
        </div>
      </div>
    );

    if (msg.type === "ai") return (
      <div>
        <div style={{ whiteSpace:"pre-wrap" }}>{msg.content}</div>
        {msg.showResolve && resolved === null && (
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <button onClick={() => handleResolved(true)} style={{ flex:1, padding:9, background:"#16A34A", color:"#fff", border:"none", borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>✓ 解決した！</button>
            <button onClick={() => handleResolved(false)} style={{ flex:1, padding:9, background:"#DC2626", color:"#fff", border:"none", borderRadius:9, fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>✗ まだ解決しない</button>
          </div>
        )}
      </div>
    );

    if (msg.type === "done-resolved") return (
      <div style={{ textAlign:"center", padding:"12px 0" }}>
        <div style={{ fontSize:40, marginBottom:8 }}>🎉</div>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:4 }}>解決できてよかったです！</div>
        <div style={{ fontSize:12, color:"#5A6070" }}>お役に立てて嬉しいです。今後もお気軽にご利用ください。</div>
        <div style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 8px", borderRadius:11, fontSize:10, fontWeight:600, background:"#EEF3FF", color:"#2563EB", marginTop:8 }}>✓ 対応完了ログを保存しました</div>
      </div>
    );

    if (msg.type === "done-escalated") return (
      <div style={{ textAlign:"center", padding:"12px 0" }}>
        <div style={{ fontSize:40, marginBottom:8 }}>📋</div>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:4 }}>スタッフに引き継ぎました</div>
        <div style={{ fontSize:12, color:"#5A6070" }}>内容を確認の上、スタッフから折り返しご連絡いたします。少々お待ちください。</div>
        <div style={{ display:"inline-flex", gap:4, padding:"3px 8px", borderRadius:11, fontSize:10, fontWeight:600, background:"#EEF3FF", color:"#2563EB", marginTop:8 }}>受付ID: {msg.content}</div>
      </div>
    );

    if (msg.type === "done-urgent") return (
      <div style={{ textAlign:"center", padding:"12px 0" }}>
        <div style={{ fontSize:40, marginBottom:8 }}>🚨</div>
        <div style={{ fontWeight:700, fontSize:14, marginBottom:4 }}>緊急対応としてスタッフに引き継ぎました</div>
        <div style={{ fontSize:12, color:"#5A6070" }}>スタッフが至急確認の上、対応いたします。少々お待ちください。</div>
        <div style={{ display:"inline-flex", gap:4, padding:"3px 8px", borderRadius:11, fontSize:10, fontWeight:600, background:"#FEF2F2", color:"#DC2626", marginTop:8 }}>受付ID: {msg.content}</div>
      </div>
    );

    if (msg.type === "handoff-notice") return (
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 10px", background:"#EEF3FF", borderRadius:8, fontSize:12, color:"#2563EB", fontWeight:600 }}>
        <span>📋</span><span>{msg.content}</span>
      </div>
    );
    if (msg.type === "error") return <div style={{ color:"#D97706" }}>{msg.content}</div>;
    return <span>{msg.content}</span>;
  };

  if (phase === "modal") return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.45)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
      <div style={{ background:"#fff", borderRadius:16, padding:22, width:"100%", maxWidth:420 }}>
        <h2 style={{ fontSize:16, fontWeight:700, marginBottom:5 }}>🏠 シェア180｜不具合サポート</h2>
        <p style={{ fontSize:12, color:"#5A6070", marginBottom:16, lineHeight:1.5 }}>AIが解決策をご案内します。解決しない場合はスタッフが対応します。</p>

        <div style={{ marginBottom:12 }}>
          <label style={{ fontSize:11, fontWeight:600, color:"#5A6070", display:"block", marginBottom:6 }}>エリア <span style={{ color:"#DC2626" }}>*</span></label>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
            {Object.keys(AREA_PROPERTIES).map(area => (
              <button key={area} onClick={() => setUser(u => ({...u, area, property:""}))} style={{
                padding:"9px 8px", border:`1.5px solid ${user.area===area?"#2563EB":"#E2E4E9"}`,
                borderRadius:8, background: user.area===area ? "#EEF3FF" : "#F8F9FB",
                color: user.area===area ? "#2563EB" : "#5A6070",
                fontSize:12, fontWeight: user.area===area ? 700 : 400,
                cursor:"pointer", fontFamily:"inherit", textAlign:"center", transition:"all .15s"
              }}>{area}</button>
            ))}
          </div>
        </div>

        {user.area && (
          <div style={{ marginBottom:12 }}>
            <label style={{ fontSize:11, fontWeight:600, color:"#5A6070", display:"block", marginBottom:4 }}>物件名 <span style={{ color:"#DC2626" }}>*</span></label>
            <select value={user.property} onChange={e => setUser(u => ({...u, property:e.target.value}))} style={{ width:"100%", padding:"9px 11px", border:"1.5px solid #E2E4E9", borderRadius:8, fontSize:13, fontFamily:"inherit", background:"#F8F9FB", outline:"none", cursor:"pointer" }}>
              <option value="">-- 物件を選んでください --</option>
              {AREA_PROPERTIES[user.area].map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>
        )}

        {[
          { label:"部屋番号", id:"room", placeholder:"例：101、203B" },
          { label:"お名前",   id:"name", placeholder:"例：山田 太郎" },
        ].map(f => (
          <div key={f.id} style={{ marginBottom:12 }}>
            <label style={{ fontSize:11, fontWeight:600, color:"#5A6070", display:"block", marginBottom:4 }}>{f.label} <span style={{ color:"#DC2626" }}>*</span></label>
            <input type="text" placeholder={f.placeholder} value={user[f.id]} onChange={e => setUser(u => ({...u, [f.id]:e.target.value}))} maxLength={30} style={{ width:"100%", padding:"9px 11px", border:"1.5px solid #E2E4E9", borderRadius:8, fontSize:13, fontFamily:"inherit", background:"#F8F9FB", outline:"none" }} />
          </div>
        ))}

        <button onClick={startChat} style={{ width:"100%", padding:12, background:"#2563EB", color:"#fff", border:"none", borderRadius:10, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit", marginTop:4 }}>サポートを開始する →</button>
        <p style={{ fontSize:10, color:"#9BA3B2", marginTop:10, textAlign:"center" }}>入力情報はスタッフへの連絡時のみ使用します</p>
      </div>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#F4F5F7" }}>
      {/* ヘッダー */}
      <div style={{ background:"#fff", borderBottom:"1px solid #E2E4E9", padding:"11px 14px", display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
        <div style={{ width:32, height:32, background:"#2563EB", borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:800, fontSize:13, flexShrink:0 }}>180</div>
        <div>
          <div style={{ fontWeight:700, fontSize:13 }}>シェア180｜不具合サポート</div>
          <div style={{ fontSize:10, color:"#5A6070" }}>{user.property} {user.room}号室 {user.name}さん</div>
        </div>
        <button onClick={onSwitchAdmin} style={{ marginLeft:"auto", padding:"6px 12px", background:"#F0F2F5", border:"1px solid #E2E4E9", borderRadius:7, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit", color:"#5A6070" }}>管理画面 →</button>
      </div>

      {/* メッセージ */}
      <div style={{ flex:1, overflowY:"auto", padding:"14px 12px" }}>
        {messages.map((msg, i) => renderMsg(msg, i))}
        {loading && (
          <div style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:12 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:"#2563EB", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, flexShrink:0 }}>🤖</div>
            <div style={{ padding:"10px 14px", borderRadius:12, borderTopLeftRadius:4, background:"#fff", border:"1px solid #E2E4E9", display:"flex", gap:4 }}>
              {[0,1,2].map(n => <span key={n} style={{ width:6, height:6, background:"#9BA3B2", borderRadius:"50%", display:"inline-block", animation:"bounce .8s infinite", animationDelay:`${n*.1}s` }}/>)}
            </div>
          </div>
        )}
        {/* エスカレーションフォーム */}
        {showEscForm && !escalated && (
          <div style={{ background:"#fff", border:"1px solid #E2E4E9", borderRadius:12, padding:14, marginBottom:12 }}>
            <div style={{ fontSize:13, marginBottom:8 }}>スタッフに引き継ぎます。<br/><span style={{ fontSize:11, color:"#5A6070" }}>補足があれば入力してください（任意）。なければそのまま送信してください。</span></div>
            <textarea value={escDetail} onChange={e => setEscDetail(e.target.value)} placeholder="例：朝から全く繋がらない。ルーターのランプが赤点滅しています。" style={{ width:"100%", padding:"9px 11px", border:"1.5px solid #E2E4E9", borderRadius:7, fontSize:12, fontFamily:"inherit", resize:"vertical", minHeight:70, marginBottom:8, background:"#F8F9FB", outline:"none" }} />
            <button onClick={submitEscalate} style={{ width:"100%", padding:10, background:"#2563EB", color:"#fff", border:"none", borderRadius:9, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>📋 スタッフに引き継ぐ</button>
          </div>
        )}
        <div ref={messagesEnd} />
      </div>

      {/* 入力バー */}
      <div style={{ background:"#fff", borderTop:"1px solid #E2E4E9", padding:"10px 12px", display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()} }} placeholder="メッセージを入力..." disabled={loading || escalated || resolved === true} style={{ flex:1, padding:"9px 13px", border:"1.5px solid #E2E4E9", borderRadius:22, fontSize:13, fontFamily:"inherit", background:"#F8F9FB", outline:"none" }} />
        <button onClick={sendMessage} disabled={loading || !input.trim() || escalated || resolved === true} style={{ width:38, height:38, background:"#2563EB", color:"#fff", border:"none", borderRadius:"50%", fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, opacity:(loading||!input.trim()||escalated||resolved===true)?0.4:1 }}>↑</button>
      </div>
      <style>{`@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

// ==================== 管理画面 ====================
function Admin({ onSwitchChat }) {
  const [logs, setLogs] = useState([]);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [lastUpdate, setLastUpdate] = useState("読み込み中...");

  const loadLogs = async () => {
    if (!window.storage) { setLastUpdate("ストレージ未接続"); return; }
    setLastUpdate("更新中...");
    try {
      let idx = [];
      try { const r = await window.storage.get("log_index"); if (r) idx = JSON.parse(r.value); } catch(e){}
      const loaded = [];
      for (const item of idx.slice(0,200)) {
        try { const r = await window.storage.get(item.key); if (r) loaded.push(JSON.parse(r.value)); else loaded.push({...item, history:[]}); } catch(e) { loaded.push({...item, history:[]}); }
      }
      setLogs(loaded);
      setLastUpdate("最終更新: " + new Date().toLocaleTimeString("ja-JP"));
    } catch(e) { setLastUpdate("読み込みエラー"); }
  };

  useEffect(() => { loadLogs(); const t = setInterval(loadLogs, 30000); return () => clearInterval(t); }, []);

  const filtered = logs.filter(l => {
    if (filter !== "all" && l.status !== filter) return false;
    if (search) { const q = search.toLowerCase(); return (l.name||"").toLowerCase().includes(q)||(l.property||"").toLowerCase().includes(q)||(l.category||"").toLowerCase().includes(q)||(l.room||"").includes(q); }
    return true;
  });

  const total = logs.length;
  const resolved = logs.filter(l=>l.status==="resolved").length;
  const escalated = logs.filter(l=>l.status==="escalated").length;
  const urgent = logs.filter(l=>l.status==="urgent").length;

  const catCounts = {};
  logs.forEach(l => { const k=l.category||"不明"; catCounts[k]=(catCounts[k]||0)+1; });
  const catSorted = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const catMax = catSorted[0]?.[1]||1;

  const selLog = selected ? logs.find(l=>l.sessionId===selected) : null;

  const Badge = ({status}) => {
    const b = badgeStyle(status);
    return <span style={{ display:"inline-flex", alignItems:"center", padding:"2px 7px", borderRadius:10, fontSize:10, fontWeight:700, background:b.bg, color:b.color }}>{b.label}</span>;
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#F0F2F5", fontFamily:"'Hiragino Sans','Noto Sans JP',sans-serif" }}>
      {/* ヘッダー */}
      <div style={{ background:"#1A1D23", color:"#fff", padding:"13px 20px", display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
        <div style={{ width:34, height:34, background:"#2563EB", borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, flexShrink:0 }}>180</div>
        <div>
          <div style={{ fontWeight:700, fontSize:14 }}>シェア180｜不具合管理画面</div>
          <div style={{ fontSize:11, color:"#9BA3B2" }}>AIサポートの対応ログを確認・管理</div>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:11, color:"#9BA3B2" }}>{lastUpdate}</span>
          <button onClick={loadLogs} style={{ padding:"6px 12px", background:"rgba(255,255,255,.12)", border:"1px solid rgba(255,255,255,.2)", borderRadius:7, color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>🔄 更新</button>
          <button onClick={onSwitchChat} style={{ padding:"6px 12px", background:"rgba(255,255,255,.12)", border:"1px solid rgba(255,255,255,.2)", borderRadius:7, color:"#fff", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>← チャット</button>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>
        {/* サイドバー */}
        <div style={{ width:280, background:"#fff", borderRight:"1px solid #E2E4E9", display:"flex", flexDirection:"column", flexShrink:0 }}>
          <div style={{ padding:"12px 14px", borderBottom:"1px solid #E2E4E9" }}>
            <div style={{ fontWeight:700, fontSize:12, marginBottom:8 }}>対応ログ一覧</div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 名前・物件・カテゴリで検索..." style={{ width:"100%", padding:"7px 10px", border:"1.5px solid #E2E4E9", borderRadius:7, fontSize:11, fontFamily:"inherit", background:"#F8F9FB", outline:"none" }} />
          </div>
          <div style={{ display:"flex", gap:3, padding:"8px 10px", borderBottom:"1px solid #E2E4E9", flexWrap:"wrap" }}>
            {[["all","すべて"],["urgent","🚨 緊急"],["escalated","📋 要対応"],["resolved","✓ 解決"],["ongoing","💬 対話中"]].map(([s,l]) => (
              <button key={s} onClick={()=>setFilter(s)} style={{ padding:"4px 8px", borderRadius:6, border:`1.5px solid ${filter===s?"#2563EB":"#E2E4E9"}`, background:filter===s?"#2563EB":"#fff", color:filter===s?"#fff":"#5A6070", fontSize:10, fontWeight:600, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>{l}</button>
            ))}
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:8 }}>
            {filtered.length === 0 ? (
              <div style={{ textAlign:"center", padding:30, color:"#9BA3B2", fontSize:12 }}>該当するログがありません</div>
            ) : filtered.map(l => (
              <div key={l.sessionId} onClick={()=>setSelected(l.sessionId)} style={{ padding:"10px 11px", borderRadius:9, cursor:"pointer", border:`1.5px solid ${selected===l.sessionId?"#2563EB":"transparent"}`, background:selected===l.sessionId?"#EEF3FF":"#fff", marginBottom:5, transition:"all .15s" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                  <span style={{ fontWeight:700, fontSize:12 }}>{l.name||"不明"}</span>
                  <span style={{ fontSize:10, color:"#9BA3B2" }}>{fmtTime(l.endTime||l.time||l.startTime)}</span>
                </div>
                <div style={{ fontSize:11, color:"#5A6070", marginBottom:4 }}>🏠 {l.property||"—"} {l.room||""}号室</div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:11, color:"#5A6070" }}>📂 {l.category||"—"}</span>
                  <Badge status={l.status} />
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* メインエリア */}
        <div style={{ flex:1, overflowY:"auto", padding:16 }}>
          {/* 統計 */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:14 }}>
            {[
              {label:"総受付件数", val:total, color:"#2563EB", sub:"全期間"},
              {label:"AI解決率", val:total?Math.round(resolved/total*100)+"%":"—", color:"#16A34A", sub:"スタッフ対応不要"},
              {label:"スタッフ引継", val:escalated, color:"#D97706", sub:"対応待ち"},
              {label:"緊急対応", val:urgent, color:"#DC2626", sub:"要確認件数"},
            ].map(s => (
              <div key={s.label} style={{ background:"#fff", borderRadius:10, padding:"14px 16px", border:"1px solid #E2E4E9" }}>
                <div style={{ fontSize:10, color:"#5A6070", fontWeight:600, marginBottom:5, textTransform:"uppercase", letterSpacing:".5px" }}>{s.label}</div>
                <div style={{ fontSize:26, fontWeight:800, color:s.color, lineHeight:1 }}>{s.val}</div>
                <div style={{ fontSize:10, color:"#9BA3B2", marginTop:3 }}>{s.sub}</div>
              </div>
            ))}
          </div>

          {/* カテゴリグラフ */}
          <div style={{ background:"#fff", borderRadius:10, border:"1px solid #E2E4E9", marginBottom:14, overflow:"hidden" }}>
            <div style={{ padding:"12px 16px", borderBottom:"1px solid #E2E4E9", fontWeight:700, fontSize:13 }}>カテゴリ別件数</div>
            <div style={{ padding:"12px 16px" }}>
              {catSorted.length === 0 ? <div style={{ textAlign:"center", padding:20, color:"#9BA3B2", fontSize:12 }}>データなし</div> :
                catSorted.map(([cat,cnt]) => (
                  <div key={cat} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <div style={{ fontSize:12, width:120, flexShrink:0, color:"#5A6070" }}>{cat}</div>
                    <div style={{ flex:1, background:"#F8F9FB", borderRadius:4, height:16, overflow:"hidden" }}>
                      <div style={{ height:"100%", background:"#2563EB", borderRadius:4, width:Math.round(cnt/catMax*100)+"%" }} />
                    </div>
                    <div style={{ fontSize:11, fontWeight:700, color:"#5A6070", width:24, textAlign:"right" }}>{cnt}</div>
                  </div>
                ))
              }
            </div>
          </div>

          {/* 詳細 */}
          {selLog ? (
            <div style={{ background:"#fff", borderRadius:10, border:"1px solid #E2E4E9", overflow:"hidden" }}>
              <div style={{ padding:"14px 18px", borderBottom:"1px solid #E2E4E9", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontWeight:700, fontSize:15, marginBottom:3 }}>{selLog.name||"不明"}さん（{selLog.property||"—"} {selLog.room||""}号室）</div>
                  <div style={{ fontSize:11, color:"#5A6070" }}>受付ID: {selLog.sessionId}</div>
                </div>
                <Badge status={selLog.status} />
              </div>
              <div style={{ padding:"14px 18px", borderBottom:"1px solid #E2E4E9", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                {[
                  {label:"カテゴリ", val:"📂 "+(selLog.category||"—")},
                  {label:"受付日時", val:fmtFull(selLog.startTime)},
                  {label:"対応時間", val:`⏱ ${selLog.startTime&&selLog.endTime?Math.round((new Date(selLog.endTime)-new Date(selLog.startTime))/60000)+"分":"-"} / ${selLog.turns||0}往復`},
                  ...(selLog.detail ? [{label:"補足・詳細", val:selLog.detail, full:true}] : [])
                ].map(m => (
                  <div key={m.label} style={{ gridColumn: m.full ? "1/-1" : "auto" }}>
                    <div style={{ fontSize:10, fontWeight:600, color:"#9BA3B2", textTransform:"uppercase", letterSpacing:".5px", marginBottom:3 }}>{m.label}</div>
                    <div style={{ fontSize:13, fontWeight:600 }}>{m.val}</div>
                  </div>
                ))}
              </div>
              <div style={{ padding:"14px 18px" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#5A6070", textTransform:"uppercase", letterSpacing:".5px", marginBottom:12 }}>📝 チャット対応ログ</div>
                {(selLog.history||[]).length === 0 ? (
                  <div style={{ textAlign:"center", padding:16, color:"#9BA3B2", fontSize:12 }}>チャット履歴がありません</div>
                ) : (selLog.history||[]).map((m, i) => (
                  <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:10, flexDirection:m.role==="user"?"row-reverse":"row" }}>
                    <div style={{ width:24, height:24, borderRadius:"50%", background:m.role==="user"?"#E2E8F0":"#2563EB", color:m.role==="user"?"#5A6070":"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, flexShrink:0 }}>{m.role==="user"?"👤":"🤖"}</div>
                    <div style={{ maxWidth:"80%", padding:"8px 11px", borderRadius:9, fontSize:12, lineHeight:1.6, background:m.role==="user"?"#2563EB":"#F8F9FB", color:m.role==="user"?"#fff":"#1A1D23", border:m.role==="user"?"none":"1px solid #E2E4E9", whiteSpace:"pre-wrap" }}>{m.content}</div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div style={{ textAlign:"center", padding:"50px 20px", color:"#9BA3B2" }}>
              <div style={{ fontSize:44, marginBottom:12 }}>📋</div>
              <div style={{ fontSize:13 }}>左のリストからログを選択すると詳細が表示されます</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ==================== アプリルート ====================
function App() {
  const [view, setView] = useState("chat");
  return view === "chat"
    ? <Chatbot onSwitchAdmin={() => setView("admin")} />
    : <Admin onSwitchChat={() => setView("chat")} />;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
